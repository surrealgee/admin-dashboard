<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="grid-container">
        <header>
            Header
        </header>
        <aside>
            <span>
                <img class="dashboard-icon" src="images/view-dashboard.png">
                <h1 class="dashboard-title"><a href="#">Dashboard</a></h1>
            </span>
            <nav>
                <ul class="nav-menu">
                    <li><img class="svg" src="images/home.png"><a href="#">Home</a></li>
                    <li><img class="svg" src="images/card-account-details-outline.png" alt=""><a href="#">Profile</a></li>
                    <li><img class="svg" src="images/message-reply.png"><a href="#">Messages</a></li>
                    <li><img class="svg" src="images/clock.png"><a href="#">History</a></li>
                    <li><img class="svg" src="images/note-multiple.png"><a href="#">Tasks</a></li>
                    <li><img class="svg" src="images/account-group.png"><a href="#">Communities</a></li>
                </ul>
                <ul class="settings-menu">
                    <li><img class="svg" src="images/cog.png"><a href="#">Settings</a></li>
                    <li><img class="svg" src="images/help-box.png"><a href="#">Support</a></li>
                    <li><img class="svg" src="images/shield-check.png"><a href="#">Privacy</a></li>
                </ul>
            </nav>
        </aside>
        <main>Main</main>
    </div>
</body>

</html>
